name: AgentPM Registry Build and Audit

on:
  push:
    branches:
      - main
    paths:
      - 'registry/packages/**'
  pull_request:
    paths:
      - 'registry/packages/**'
  workflow_dispatch:

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build AgentPM
        run: npm run build

      - name: Audit all packages in registry
        run: |
          echo "Running AgentPM Security Audit on Registry..."
          node ./dist/index.js audit registry/packages

      - name: Deploy to Cloudflare Workers (D1 Backend)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd backend
          npm ci
          npx wrangler deploy --minify src/index.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
